<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="20" flood-color="#000" flood-opacity="0.2"/>
    </filter>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fde047"/>
      <stop offset="100%" stop-color="#eab308"/>
    </linearGradient>
    <clipPath id="squircle">
      <rect width="420" height="420" x="46" y="46" rx="96" ry="96"/>
    </clipPath>
  </defs>
  <rect width="420" height="420" x="46" y="46" rx="96" ry="96" fill="#ffffff" filter="url(#shadow)"/>
  <g clip-path="url(#squircle)">
    <rect width="420" height="120" x="46" y="46" fill="url(#headerGrad)"/>
    <line x1="46" y1="200" x2="466" y2="200" stroke="#f3f4f6" stroke-width="4"/>
    <line x1="46" y1="260" x2="466" y2="260" stroke="#f3f4f6" stroke-width="4"/>
    <line x1="46" y1="320" x2="466" y2="320" stroke="#f3f4f6" stroke-width="4"/>
    <line x1="46" y1="380" x2="466" y2="380" stroke="#f3f4f6" stroke-width="4"/>
    
    <line x1="100" y1="230" x2="300" y2="230" stroke="#d1d5db" stroke-width="16" stroke-linecap="round"/>
    <line x1="100" y1="290" x2="400" y2="290" stroke="#d1d5db" stroke-width="16" stroke-linecap="round"/>
    <line x1="100" y1="350" x2="250" y2="350" stroke="#d1d5db" stroke-width="16" stroke-linecap="round"/>
  </g>
  <rect width="420" height="420" x="46" y="46" rx="96" ry="96" fill="none" stroke="#e5e5e5" stroke-width="3"/>
</svg>
